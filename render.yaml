services:
  - type: web
    name: vanguard-digital-hub
    runtime: node
    buildCommand: bun install && bun run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Enter your Google Gemini API Key"
      - key: VITE_SUPABASE_URL
        sync: false
        placeholder: "Enter your Supabase Project URL (optional)"
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
        placeholder: "Enter your Supabase Anon Key (optional)"
