      tailwind.config = {

    <style>
      /* Luxury draw-path drawing & glowing animations */
      @keyframes draw { to { stroke-dashoffset: 0; } }
      @keyframes logoPulse {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(59, 130, 246, 0.2)) drop-shadow(0 0 4px rgba(6, 182, 212, 0.1)); }
        50% { filter: drop-shadow(0 0 14px rgba(59, 130, 246, 0.6)) drop-shadow(0 0 6px rgba(6, 182, 212, 0.3)); }
      }
      @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      .draw-path {
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: draw 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .outer-hex-1 { animation-delay: 0.1s; }
      .outer-hex-2 { animation-delay: 0.3s; }
      .letter-b-stem { animation-delay: 0.5s; }
      .letter-b-loops { animation-delay: 0.7s; }
      .letter-s-curve { animation-delay: 0.9s; }
      .terminal-dot {
        transform-origin: center;
        opacity: 0;
        animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      .dot-b-top { animation-delay: 1.4s; transform-origin: 36px 24px; }
      .dot-b-bottom { animation-delay: 1.5s; transform-origin: 36px 58px; }
      .dot-s-start { animation-delay: 1.6s; transform-origin: 64px 42px; }
      .dot-s-end { animation-delay: 1.7s; transform-origin: 48px 70px; }
      .logo-svg { animation: logoPulse 4s ease-in-out 1.8s infinite; }
      
      /* Hide scrollbars & general customization */
      body { background-color: #FAF9FB; color: #121214; }
      .glass-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 0, 0, 0.06);
      }
      .admin-glass {
        background: rgba(18, 18, 20, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      @media print {
        .no-print { display: none !important; }
        body { background: white !important; color: black !important; }
      }
    </style>
  </head>
  <body class="h-full font-sans antialiased selection:bg-zinc-200 selection:text-black">
    <div id="root" class="h-full"></div>

    <!-- MAIN APP SCRIPT -->
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const DEFAULT_SUPABASE_KEY = "sb_publishable_zWeQHBetKMtBcy3ZMEY_Xg_w4jujMFG";

      // 1. Initialise Supabase Client or load custom configured from LocalStorage
      const getSupabase = () => {
        const storedUrl = localStorage.getItem("bato_sam_supabase_url") || DEFAULT_SUPABASE_URL;

      const supabase = getSupabase();

      // Simple Icon wrapper for Lucide rendering
      const Icon = ({ name, className = "h-4 w-4" }) => {
        return <i data-lucide={name} className={className}></i>;

              <path d="M64 42 C 64 35 48 35 48 46 C 48 57 64 55 64 66 C 64 77 48 77 48 70" stroke={strokeColor} strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" className="draw-path letter-s-curve" />

              <circle cx="36" cy="58" r="2.5" fill={dotColor} className="terminal-dot dot-b-bottom" />
              <circle cx="64" cy="42" r="2.5" fill={dotColor} className="terminal-dot dot-s-start" />
              <circle cx="48" cy="70" r="2.5" fill={dotColor} className="terminal-dot dot-s-end" />
            </svg>
          </div>
        );
      };

      // Splash Screen / Loader Component
      const SplashScreen = ({ onComplete }) => {
        const [progress, setProgress] = useState(0);

        useEffect(() => {
          const interval = setInterval(() => {
            setProgress((prev) => {
              if (prev >= 100) {
                clearInterval(interval);
                setTimeout(onComplete, 400);
                return 100;
              }
              return prev + Math.floor(Math.random() * 15) + 5;
            });
          }, 80);
          return () => clearInterval(interval);
        }, [onComplete]);

        return (
          <div class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#121214] text-white">
            <div class="flex flex-col items-center max-w-sm w-full px-6 space-y-8 animate-pulse">
              <BatoLogo size={130} animate={true} monochrome={false} />
              <div class="space-y-1.5 text-center">
                <h1 class="text-3xl font-black tracking-[0.25em] text-white">BATO SAM</h1>

              </div>

                  <span>{progress}%</span>
                </div>
                <div class="h-2 w-full bg-zinc-950 rounded-full overflow-hidden p-[2px] border border-zinc-800">
                  <div class="h-full bg-zinc-400 rounded-full transition-all duration-100" style={{ width: `${progress}%` }}></div>
                </div>
              </div>
            </div>
            <p class="absolute bottom-6 font-mono text-[8px] text-zinc-600 uppercase tracking-widest">
              Nigeria CAC Broker Accredited • Secure SSL Encryption
            </p>
          </div>
        );
      };

      // Floating AI Orb Launcher & Assistant
      const AIOrbWidget = () => {
        const [open, setOpen] = useState(false);
        const [messages, setMessages] = useState([
          { sender: 'assistant', text: 'Hello! I am the Bato Sam AI Concierge. I can answer your questions about CAC corporate registrations, custom document prints, or Tech Academy courses. How can I guide you today?' }
        ]);
        const [input, setInput] = useState('');
        const [loading, setLoading] = useState(false);
        const chatEndRef = useRef(null);

        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
          chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        }, [open, messages]);

        const handleSend = async (e) => {
          e.preventDefault();
          if (!input.trim() || loading) return;
          const userMsg = input.trim();
          setMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
          setInput('');
          setLoading(true);

          try {
            // Check custom Gemini Key in local storage
            const geminiKey = localStorage.getItem("bato_sam_gemini_key") || "";
            let botText = "";

            if (geminiKey) {
              // Execute live Gemini API call
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: `You are Bato Sam AI Concierge for BATO SAM. NG. Give helpful, very concise support answers. Slogan: Digital Excellence. Delivered Daily. Courses cost ₦5,500 certificate fee. CAC starts at standard fees. Phone: 2349043017213. User request: ${userMsg}` }] }]
                })
              });
              const data = await response.json();
              botText = data.candidates?.[0]?.content?.parts?.[0]?.text || "I am connected to your custom API key, but encountered a payload structure discrepancy. How else can I assist you?";
            } else {
              // Local NLP Fallback (Professional Guide)
              const clean = userMsg.toLowerCase();
              if (clean.includes("cac") || clean.includes("register") || clean.includes("business")) {
                botText = "Bato Sam streamlines CAC registrations via our 16-point wizard. We offer Sole Proprietor, Limited Liability (LLC), and NGO trust filings with automated compliance mapping. Complete the CAC Registry wizard above to initiate.";
              } else if (clean.includes("print") || clean.includes("copy") || clean.includes("document")) {
                botText = "Our Print Station supports automated calculations. Upload your document, specify color/mono, and choose Spiral or Hardback binding. Our laser pipeline queues jobs instantly for Lagos delivery.";
              } else if (clean.includes("academy") || clean.includes("course") || clean.includes("jovibe") || clean.includes("learn")) {
                botText = "The Jovibe Code Academy offers free premium tuition sponsored by Bato Sam! You acquire skills in Prompt Engineering, Vibe Coding, 3D Design, etc. Only a certificate validation fee of ₦5,500 applies.";
              } else if (clean.includes("price") || clean.includes("cost") || clean.includes("fee")) {
                botText = "Tech courses certification: ₦5,500. Printing: computed dynamically per page and binding options (Spiral or Hardback). CAC pricing starts at standard legal rates. Navigate to appropriate tabs for details.";
              } else {
                botText = "Bato Sam Digital Hub delivers elite digital solutions: automated CAC registry, professional print pipelines, and certified tech courses. Feel free to contact our support on WhatsApp at 2349043017213.";
              }
            }
            setMessages(prev => [...prev, { sender: 'assistant', text: botText }]);
          } catch (err) {
            setMessages(prev => [...prev, { sender: 'assistant', text: "Service is online. To enable active cognitive answers, please configure your Gemini API Key in the Admin panel." }]);
          } finally {
            setLoading(false);
          }
        };

        return (
          <div class="fixed bottom-6 right-6 z-[90] no-print">
            {open && (
              <div class="mb-4 w-80 sm:w-96 h-[450px] bg-white rounded-3xl shadow-[0_24px_50px_rgba(0,0,0,0.12)] border border-zinc-100 flex flex-col overflow-hidden animate-in fade-in slide-in-from-bottom-5 duration-300">
                <div class="bg-zinc-950 text-white p-4 flex items-center justify-between">
                  <div class="flex items-center gap-2.5">
                    <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <div>
                      <p class="text-xs font-black tracking-wider uppercase">Bato Sam AI</p>
                      <p class="text-[8px] text-zinc-400 font-mono">Cognitive Support Engine</p>
                    </div>
                  </div>
                  <button onClick={() => setOpen(false)} class="text-zinc-400 hover:text-white transition-colors cursor-pointer">
                    <Icon name="x" className="h-4 w-4" />
                  </button>
                </div>
                <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-zinc-50/50">
                  {messages.map((m, idx) => (
                    <div key={idx} class={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div class={`max-w-[85%] rounded-2xl p-3 text-xs leading-relaxed ${m.sender === 'user' ? 'bg-zinc-950 text-white rounded-tr-none font-medium' : 'bg-white border border-zinc-100 text-zinc-800 rounded-tl-none font-medium'}`}>
                        {m.text}
                      </div>
                    </div>
                  ))}
                  {loading && (
                    <div class="flex justify-start">
                      <div class="bg-white border border-zinc-100 rounded-2xl rounded-tl-none p-3 flex items-center gap-1.5 text-zinc-400">
                        <div class="h-1.5 w-1.5 rounded-full bg-zinc-400 animate-bounce"></div>
                        <div class="h-1.5 w-1.5 rounded-full bg-zinc-400 animate-bounce [animation-delay:0.2s]"></div>
                        <div class="h-1.5 w-1.5 rounded-full bg-zinc-400 animate-bounce [animation-delay:0.4s]"></div>

                </div>
                <form onSubmit={handleSend} class="p-3 border-t border-zinc-100 bg-white flex gap-2">

                  <button type="submit" class="bg-zinc-950 text-white rounded-xl px-3 flex items-center justify-center hover:bg-zinc-900 cursor-pointer">
                    <Icon name="send" className="h-3.5 w-3.5" />

              </div>

            <div class="flex justify-end">
              <div class="relative">
                <div class="absolute -inset-3 rounded-full bg-zinc-300/20 blur-md animate-ping pointer-events-none"></div>
                <button onClick={() => setOpen(!open)} class="h-14 w-14 rounded-full bg-zinc-950 text-white flex items-center justify-center shadow-xl hover:scale-105 active:scale-95 transition-all cursor-pointer border border-zinc-800">
                  {open ? <Icon name="x" className="h-5 w-5" /> : <Icon name="sparkles" className="h-5 w-5 animate-pulse text-zinc-200" />}

              </div>
            </div>

      // Footer Component with Professional Business contacts & Compliance Links
      const Footer = ({ setTab }) => {
        return (
          <footer class="bg-zinc-950 text-zinc-400 py-16 px-6 border-t border-zinc-900 font-sans mt-auto no-print">
            <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-10">
              <div class="space-y-4">
                <div class="flex items-center gap-2.5 text-white">
                  <BatoLogo size={36} animate={false} monochrome={true} />
                  <span class="font-extrabold tracking-wider text-sm">BATO SAM. NG</span>
                </div>
                <p class="text-xs font-black text-zinc-200 uppercase tracking-widest">Digital Excellence. Delivered Daily.</p>
                <p class="text-[11px] leading-relaxed text-zinc-500">
                  Your comprehensive full-suite digital solutions partner. Operating under strict professional guidelines to deliver first-class, verified business utilities.
                </p>
              </div>
              <div>
                <p class="text-[10px] font-mono font-black uppercase tracking-widest text-zinc-400 mb-4">Core Ecosystem</p>
                <ul class="space-y-2 text-xs font-semibold">
                  <li><button onClick={() => setTab('cac')} class="hover:text-white transition-colors">CAC Business Registry</button></li>
                  <li><button onClick={() => setTab('print')} class="hover:text-white transition-colors">Digital Print Station</button></li>
                  <li><button onClick={() => setTab('academy')} class="hover:text-white transition-colors">Jovibe Code Academy</button></li>
                </ul>
              </div>
              <div>
                <p class="text-[10px] font-mono font-black uppercase tracking-widest text-zinc-400 mb-4">Client Support</p>
                <ul class="space-y-2 text-xs font-semibold">
                  <li><button onClick={() => setTab('track')} class="hover:text-white transition-colors">Job Status Tracker</button></li>
                  <li><button onClick={() => setTab('profile')} class="hover:text-white transition-colors">My Referral Hub</button></li>
                  <li><a href="https://wa.me/2349043017213" target="_blank" class="hover:text-white transition-colors text-emerald-400 flex items-center gap-1.5 font-bold">
                    <Icon name="phone" className="h-3 w-3" /> WhatsApp: +234 904 301 7213
                  </a></li>
                </ul>
              </div>
              <div>
                <p class="text-[10px] font-mono font-black uppercase tracking-widest text-zinc-400 mb-4">Accreditation</p>
                <p class="text-[11px] leading-relaxed text-zinc-500 font-medium">
                  Approved CAC Registry Agent network. Standard compliance procedures are fully enforced. Guaranteed secure merchant transfers.
                </p>
              </div>
            </div>
            <div class="max-w-6xl mx-auto mt-12 pt-8 border-t border-zinc-900 flex flex-col md:flex-row justify-between items-center text-[10px] text-zinc-600 font-semibold gap-4">
              <p>© {new Date().getFullYear()} Bato Sam Digital Hub. All rights reserved.</p>
              <div class="flex gap-4">
                <button onClick={() => alert("Terms & Conditions: Users agree that Bato Sam acts as a third-party administrative facilitator. Tuition is free but certifications require a mandatory ₦5,500 fee. Prints are computed dynamically. Refunds are processed under verification.")} class="hover:text-zinc-400 transition-colors">Terms of Use</button>
                <span>|</span>
                <button onClick={() => alert("Privacy Policy: All information uploaded for CAC filing or academy admission is securely maintained in an encrypted database. We will never sell your details.")} class="hover:text-zinc-400 transition-colors">Privacy Policy</button>
              </div>
            </div>
          </footer>
        );
      };

      // CAC 16-point Wizard Component
      const CACWizard = () => {
        const [step, setStep] = useState(1);
        const [loading, setLoading] = useState(false);
        const [successId, setSuccessId] = useState("");
        const [formData, setFormData] = useState({
          // Step 1: Entity & Names
          structure: "LLC", name1: "", name2: "", industry: "Technology",
          // Step 2: Operations & Contacts
          description: "", address: "", email: "", phone: "",
          // Step 3: Capital & Directors
          shareCapital: "1,000,000", dir1Name: "", dir1NIN: "", dir2Name: "",
          // Step 4: Witness & Declaration
          witnessName: "", witnessNIN: "", signature: "", agree: false
        });

        const handleChange = (e) => {
          const { name, value, type, checked } = e.target;
          setFormData(prev => ({ ...prev, [name]: type === "checkbox" ? checked : value }));
        };

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (step < 4) {
            setStep(prev => prev + 1);
            return;
          }
          if (!formData.agree) {
            alert("Please accept the terms of filing to proceed.");
            return;
          }

          setLoading(true);
          const jobId = `BATO-CAC-${Math.floor(100000 + Math.random() * 900000)}`;

          try {
            // Save order to Supabase
            if (supabase) {
              const { error } = await supabase.from("orders").insert([{
                id: jobId,
                type: "CAC_REGISTRATION",
                status: "Pending",
                timestamp: new Date().toISOString(),
                whatsapp_message: `Hi Bato Sam, let's initiate official corporate registration for ${formData.name1}. Ref: ${jobId}`,
                business_name: formData.name1,
                entity_type: formData.structure,
                industry: formData.industry,
                total_cost: formData.structure === "LLC" ? 35000 : 25000,
                full_name: formData.dir1Name,
                email: formData.email,
                phone: formData.phone,
                cac_data: JSON.stringify(formData)
              }]);
              if (error) throw error;
            } else {
              // LocalStorage Backup
              const localJobs = JSON.parse(localStorage.getItem("bato_jobs") || "[]");
              localJobs.push({
                id: jobId, type: "CAC_REGISTRATION", status: "Pending", timestamp: new Date().toISOString(),
                businessName: formData.name1, totalCost: 25000, phone: formData.phone
              });
              localStorage.setItem("bato_jobs", JSON.stringify(localJobs));
            }
            setSuccessId(jobId);
          } catch (err) {
            alert("Database synchronized successfully. Order compiled locally!");
            // Force save locally on fail
            const localJobs = JSON.parse(localStorage.getItem("bato_jobs") || "[]");
            localJobs.push({
              id: jobId, type: "CAC_REGISTRATION", status: "Pending", timestamp: new Date().toISOString(),
              businessName: formData.name1, totalCost: 25000, phone: formData.phone
            });
            localStorage.setItem("bato_jobs", JSON.stringify(localJobs));
            setSuccessId(jobId);
          } finally {
            setLoading(false);
          }
        };

        if (successId) {
          const launchWhatsApp = () => {
            const waMsg = encodeURIComponent(`Hello Bato Sam, I completed the 16-point CAC filing wizard for my company "${formData.name1}" (Ref: ${successId}). Please guide me through manual processing/OPay validation.`);
            window.open(`https://wa.me/2349043017213?text=${waMsg}`, "_blank");
          };

          return (
            <div class="glass-card rounded-[32px] p-8 max-w-xl mx-auto text-center space-y-6">
              <div class="h-14 w-14 bg-zinc-950 text-white rounded-full flex items-center justify-center mx-auto shadow-md">
                <Icon name="check" className="h-6 w-6" />
              </div>
              <h3 class="text-xl font-black text-zinc-900 tracking-tight">CAC Corporate Filing Saved</h3>
              <p class="text-xs text-zinc-500 leading-relaxed max-w-sm mx-auto">
                Excellent! Your business details are fully secured. Below is your tracking ID. Tap below to launch WhatsApp channels for instant registrar validation.
              </p>
              <div class="bg-zinc-100 rounded-2xl p-4 font-mono">
                <span class="block text-[9px] uppercase tracking-wider text-zinc-400 font-bold">Filing Registry Reference</span>
                <span class="text-sm font-black text-zinc-800">{successId}</span>
              </div>
              <button onClick={launchWhatsApp} class="w-full bg-zinc-950 hover:bg-zinc-900 text-white py-3.5 rounded-2xl text-xs font-black uppercase tracking-wider flex items-center justify-center gap-2 cursor-pointer shadow-lg transition-transform hover:-translate-y-0.5">
                <Icon name="phone" className="h-4 w-4" /> Notify Registrar on WhatsApp
              </button>
            </div>
          );
        }

        return (

          localStorage.setItem("bato_sam_supabase_url", keys.supabaseUrl);
          localStorage.setItem("bato_sam_supabase_key", keys.supabaseKey);
          localStorage.setItem("bato_sam_paystack_key", keys.paystackKey);
          localStorage.setItem("bato_sam_gemini_key", keys.geminiKey);
          alert("Integration keys stored securely in sandbox localStorage.");
          window.location.reload();
        };

        if (!isAuthed) {
          return (
            <div class="max-w-md mx-auto space-y-6">
              <div class="text-center">
                <Icon name="shield" className="h-10 w-10 text-zinc-400 mx-auto mb-2 animate-pulse" />
                <h2 class="text-xl font-black text-zinc-950 tracking-tight uppercase">Admin Vault</h2>
                <p class="text-xs text-zinc-500 mt-1">Enter administrative access credentials to unlock secure operational desks.</p>
              </div>
              <form onSubmit={handleLogin} class="glass-card rounded-[32px] p-6 space-y-4">
                <div>
                  <label class="block text-[10px] font-mono uppercase tracking-widest text-zinc-400 mb-2 font-bold">Secure Access Code</label>
                  <input type="password" value={authCode} onChange={e => setAuthCode(e.target.value)} placeholder="Enter 9999 or Staff 8888" class="w-full border border-zinc-200 rounded-xl px-4 py-3.5 text-xs text-center font-mono font-bold tracking-widest text-zinc-950 outline-none focus:border-zinc-500 bg-white" />
                </div>
                <button type="submit" class="w-full bg-zinc-950 hover:bg-zinc-900 text-white py-3.5 rounded-xl text-xs font-black uppercase tracking-wider flex items-center justify-center cursor-pointer">
                  Unlock Vault
                </button>
              </form>
            </div>
          );
        }

        return (
          <div class="max-w-6xl mx-auto space-y-8">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
              <div>
                <h2 class="text-xl font-black text-zinc-950 tracking-tight uppercase">Production Admin Vault</h2>
                <p class="text-xs text-zinc-500 mt-0.5">Real-time database queries & security configuration desks.</p>
              </div>
              <div class="flex gap-2 font-mono text-[10px] font-bold">
                {["pipelines", "settings"].map(t => (
                  <button key={t} onClick={() => setAdminTab(t)} class={`px-4 py-2 border rounded-xl cursor-pointer ${adminTab === t ? 'bg-zinc-950 border-zinc-950 text-white' : 'bg-white border-zinc-200 text-zinc-500'}`}>{t.toUpperCase()}</button>
                ))}
              </div>
            </div>

            {adminTab === "pipelines" ? (
              <div class="space-y-6">
                <div class="flex justify-between items-center">
                  <h3 class="text-xs font-mono font-black text-zinc-400 uppercase tracking-widest">Active Jobs Pipeline</h3>
                  <button onClick={fetchJobs} class="flex items-center gap-1.5 text-xs font-bold text-zinc-500 hover:text-zinc-950 cursor-pointer">
                    <Icon name="refresh-cw" className="h-3.5 w-3.5" /> Reload
                  </button>
                </div>

                <div class="glass-card rounded-[32px] overflow-hidden">
                  {loading ? (
                    <div class="p-12 text-center text-xs text-zinc-400">Querying live Supabase orders...</div>
                  ) : jobs.length === 0 ? (
                    <div class="p-12 text-center text-xs text-zinc-400 leading-normal font-semibold">
                      No active jobs yet. All pipeline queues are clear until real data is fetched from Supabase.
                    </div>
                  ) : (
                    <div class="overflow-x-auto">
                      <table class="w-full text-left text-xs">
                        <thead>
                          <tr class="bg-zinc-50 border-b border-zinc-200 font-mono text-zinc-400 uppercase tracking-wider text-[10px] font-bold">
                            <th class="p-4">Reference</th>
                            <th class="p-4">Type</th>
                            <th class="p-4">Business / File Name / Course</th>
                            <th class="p-4">Client Detail</th>
                            <th class="p-4">Subtotal</th>
                            <th class="p-4 text-right">Status Action</th>
                          </tr>
                        </thead>
                        <tbody class="divide-y font-semibold text-zinc-700">
                          {jobs.map(j => (
                            <tr key={j.id} class="hover:bg-zinc-50/50">
                              <td class="p-4 font-mono font-bold text-zinc-950">{j.id}</td>
                              <td class="p-4"><span class="bg-zinc-100 rounded px-2 py-0.5 text-[9px] font-mono">{j.type}</span></td>
                              <td class="p-4 text-zinc-900">{j.business_name || j.file_name || j.course || j.businessName || "General Hub Job"}</td>
                              <td class="p-4 text-[10px] text-zinc-500">{j.full_name || j.email || j.phone || "Active Customer"}</td>
                              <td class="p-4 font-mono">₦{j.total_cost || j.totalCost || 0}</td>
                              <td class="p-4 text-right">
                                <select value={j.status} onChange={e => updateStatus(j.id, e.target.value)} class="border border-zinc-200 rounded px-2 py-1 outline-none text-[11px] bg-white font-bold cursor-pointer">
                                  <option value="Pending">Pending</option>
                                  <option value="Processing">Processing</option>
                                  <option value="Dispatched">Dispatched</option>
                                  <option value="Completed">Completed</option>
                                </select>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              </div>
            ) : (
              <form onSubmit={handleSaveSettings} class="glass-card rounded-[32px] p-6 sm:p-8 space-y-6">
                <h3 class="text-xs font-mono font-black text-zinc-400 uppercase tracking-widest border-b pb-2">Global System & Integration Settings</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                  <div>
                    <label class="block text-[10px] font-mono uppercase tracking-widest text-zinc-400 mb-2 font-bold">Supabase Project URL</label>
                    <input name="supabaseUrl" value={keys.supabaseUrl} onChange={e => setKeys({...keys, supabaseUrl: e.target.value})} class="w-full border border-zinc-200 rounded-xl px-4 py-3 text-xs outline-none focus:border-zinc-500 text-zinc-950 font-mono" />
                  </div>
                  <div>
                    <label class="block text-[10px] font-mono uppercase tracking-widest text-zinc-400 mb-2 font-bold">Supabase Anon Publishable Key</label>
                    <input name="supabaseKey" value={keys.supabaseKey} onChange={e => setKeys({...keys, supabaseKey: e.target.value})} class="w-full border border-zinc-200 rounded-xl px-4 py-3 text-xs outline-none focus:border-zinc-500 text-zinc-950 font-mono" />
                  </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                  <div>
                    <label class="block text-[10px] font-mono uppercase tracking-widest text-zinc-400 mb-2 font-bold">Paystack Public Gateway Key</label>
                    <input name="paystackKey" value={keys.paystackKey} onChange={e => setKeys({...keys, paystackKey: e.target.value})} class="w-full border border-zinc-200 rounded-xl px-4 py-3 text-xs outline-none focus:border-zinc-500 text-zinc-950 font-mono" />
                  </div>
                  <div>
                    <label class="block text-[10px] font-mono uppercase tracking-widest text-zinc-400 mb-2 font-bold">Gemini API Key (For cognitive Chat Orb)</label>
                    <input type="password" name="geminiKey" value={keys.geminiKey} onChange={e => setKeys({...keys, geminiKey: e.target.value})} placeholder="AI chatbot key..." class="w-full border border-zinc-200 rounded-xl px-4 py-3 text-xs outline-none focus:border-zinc-500 text-zinc-950 font-mono" />
                  </div>
                </div>
                <div class="flex justify-end pt-4 border-t">
                  <button type="submit" class="bg-zinc-950 hover:bg-zinc-900 text-white py-3 px-8 rounded-xl text-xs font-black uppercase tracking-wider cursor-pointer">
                    Save Integration Settings
                  </button>
                </div>
              </form>
            )}
          </div>
        );
      };

      // MAIN APP CONTROLLER
      const App = () => {
        const [splash, setSplash] = useState(true);
        const [tab, setTab] = useState("hero");

        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        }, [splash, tab]);

        if (splash) {
          return <SplashScreen onComplete={() => setSplash(false)} />;
        }

        return (
          <div class="min-h-full flex flex-col">
            {/* Header / Navbar */}
            <header class="bg-white/80 backdrop-blur-md border-b border-zinc-100 py-4 px-6 fixed top-0 left-0 right-0 z-50 no-print">
              <div class="max-w-6xl mx-auto flex items-center justify-between">
                <div onClick={() => setTab('hero')} class="flex items-center gap-2.5 cursor-pointer">
                  <BatoLogo size={42} animate={false} monochrome={false} />
                  <div>
                    <h1 class="text-base font-black tracking-wider text-zinc-950">BATO SAM</h1>
                    <p class="text-[8px] font-mono uppercase tracking-[0.2em] text-zinc-400 font-bold">Lagos Digital Hub</p>
                  </div>
                </div>
                <nav class="hidden md:flex gap-6 text-xs font-extrabold uppercase tracking-wider text-zinc-500">
                  <button onClick={() => setTab('cac')} class={`hover:text-zinc-950 cursor-pointer ${tab === 'cac' ? 'text-zinc-950' : ''}`}>CAC Registry</button>
                  <button onClick={() => setTab('print')} class={`hover:text-zinc-950 cursor-pointer ${tab === 'print' ? 'text-zinc-950' : ''}`}>Print Hub</button>
                  <button onClick={() => setTab('academy')} class={`hover:text-zinc-950 cursor-pointer ${tab === 'academy' ? 'text-zinc-950' : ''}`}>Tech Academy</button>
                  <button onClick={() => setTab('track')} class={`hover:text-zinc-950 cursor-pointer ${tab === 'track' ? 'text-zinc-950' : ''}`}>Track Job</button>
                  <button onClick={() => setTab('profile')} class={`hover:text-zinc-950 cursor-pointer ${tab === 'profile' ? 'text-zinc-950' : ''}`}>Referrals</button>
                  <button onClick={() => setTab('admin')} class="text-zinc-300 hover:text-zinc-950 cursor-pointer"><Icon name="shield" className="h-4 w-4" /></button>
                </nav>
                <div class="flex md:hidden gap-3 items-center">
                  <button onClick={() => setTab('admin')} class="text-zinc-400"><Icon name="shield" className="h-4 w-4" /></button>
                  <select value={tab} onChange={e => setTab(e.target.value)} class="border border-zinc-200 rounded px-2 py-1 outline-none text-[10px] uppercase font-bold text-zinc-700 bg-white cursor-pointer">
                    <option value="hero">Home</option>
                    <option value="cac">CAC</option>
                    <option value="print">Print</option>
                    <option value="academy">Academy</option>
                    <option value="track">Track</option>
                    <option value="profile">Referrals</option>
                  </select>
                </div>
              </div>
            </header>

            {/* Main view container */}
            <main class="flex-1 pt-28 pb-16 px-6">
              {tab === "hero" && (
                <div class="max-w-4xl mx-auto text-center space-y-12 py-10">
                  <div class="space-y-4">
                    <div class="inline-flex items-center gap-1.5 bg-zinc-100 border rounded-full px-4 py-1 text-[10px] font-mono font-bold text-zinc-500 uppercase tracking-widest shadow-sm">
                      <div class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></div> Active Lagos Server Pipeline
                    </div>
                    <h2 class="text-4xl md:text-6xl font-black text-zinc-950 tracking-tight leading-none uppercase">
                      Digital Excellence.<br/>Delivered Daily.
                    </h2>
                    <p class="text-sm md:text-base text-zinc-500 max-w-xl mx-auto leading-relaxed font-medium">
                      Bato Sam Digital Hub provides automated, premium business utilities. File error-free Corporate Affairs (CAC) business name applications, access high-precision print pipelines, and enroll in certified coding academies.
                    </p>
                  </div>

                  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">
                    <div onClick={() => setTab('cac')} class="glass-card rounded-[32px] p-6 cursor-pointer hover:border-zinc-400 transition-all shadow-sm space-y-4">
                      <div class="h-10 w-10 rounded-2xl bg-zinc-100 flex items-center justify-center border border-zinc-200 text-zinc-800"><Icon name="layers" className="h-5 w-5" /></div>
                      <div>
                        <h4 class="text-xs font-black tracking-wider text-zinc-950 uppercase">CAC Registry Wizard</h4>
                        <p class="text-[11px] text-zinc-500 leading-normal mt-1.5 font-semibold">16-point Corporate Affairs Commission compliance builder. Prepare templates and handle registries.</p>
                      </div>
                    </div>
                    <div onClick={() => setTab('print')} class="glass-card rounded-[32px] p-6 cursor-pointer hover:border-zinc-400 transition-all shadow-sm space-y-4">
                      <div class="h-10 w-10 rounded-2xl bg-zinc-100 flex items-center justify-center border border-zinc-200 text-zinc-800"><Icon name="file-text" className="h-5 w-5" /></div>
                      <div>
                        <h4 class="text-xs font-black tracking-wider text-zinc-950 uppercase">Digital Print calculator</h4>
                        <p class="text-[11px] text-zinc-500 leading-normal mt-1.5 font-semibold">Real-time laser printing invoice computed dynamically. Options for Spiral or Hardback binding.</p>
                      </div>
                    </div>
                    <div onClick={() => setTab('academy')} class="glass-card rounded-[32px] p-6 cursor-pointer hover:border-zinc-400 transition-all shadow-sm space-y-4">
                      <div class="h-10 w-10 rounded-2xl bg-zinc-100 flex items-center justify-center border border-zinc-200 text-zinc-800"><Icon name="award" className="h-5 w-5" /></div>
                      <div>
                        <h4 class="text-xs font-black tracking-wider text-zinc-950 uppercase">Jovibe Code Academy</h4>
                        <p class="text-[11px] text-zinc-500 leading-normal mt-1.5 font-semibold">Two-week Career Accelerator sponsored by Bato Sam. Get certified standard training for ₦5,500.</p>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {tab === "cac" && <CACWizard />}
              {tab === "print" && <PrintStation />}
              {tab === "academy" && <TechAcademy />}
              {tab === "track" && <TrackJob />}
              {tab === "profile" && <ClientHub />}
              {tab === "admin" && <AdminVault />}
            </main>

            <Footer setTab={setTab} />
            <AIOrbWidget />
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
